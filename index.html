<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DC Tech Hub | Data Center Reference Tool</title>
    <meta name="description" content="Production-grade knowledge base and reference tool for Data Center Technicians.">
    <!-- Google Fonts -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

        :root {
            --bg-deep: #0d1117;
            --bg-card: #161b22;
            --bg-sidebar: #010409;
            --cyan: #00d4ff;
            --cyan-glow: rgba(0, 212, 255, 0.3);
            --amber: #f59e0b;
            --amber-glow: rgba(245, 158, 11, 0.3);
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --border: #30363d;
            --red: #ff4d4d;
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'IBM Plex Sans', sans-serif;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 1.6;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Scan-line Overlay */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            opacity: 0.15;
        }

        /* Global UI Elements */
        header {
            height: 64px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-right: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo::before {
            content: "";
            width: 12px;
            height: 12px;
            background: var(--cyan);
            box-shadow: 0 0 10px var(--cyan);
            border-radius: 2px;
        }

        .search-container {
            flex: 1;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .search-container input {
            width: 100%;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 4px;
            font-family: var(--font-mono);
            outline: none;
            transition: var(--transition);
        }

        .search-container input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 15px var(--cyan-glow);
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        aside {
            width: 300px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 24px 0;
            transition: var(--transition);
        }

        .nav-category {
            margin-bottom: 8px;
        }

        .nav-category-header {
            padding: 10px 24px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        .nav-category-header:hover {
            color: var(--cyan);
        }

        .nav-topics {
            padding-left: 0;
            display: none;
        }

        .nav-category.active .nav-topics {
            display: block;
        }

        .nav-topic-link {
            padding: 8px 40px;
            font-size: 0.9rem;
            color: var(--text-main);
            cursor: pointer;
            display: block;
            transition: var(--transition);
            border-left: 3px solid transparent;
        }

        .nav-topic-link:hover {
            background: rgba(0, 212, 255, 0.05);
            color: var(--cyan);
        }

        .nav-topic-link.active {
            color: var(--cyan);
            background: rgba(0, 212, 255, 0.1);
            border-left-color: var(--cyan);
        }

        /* Main Content Area */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 48px;
            background: radial-gradient(circle at top right, rgba(0, 212, 255, 0.02), transparent 40%);
        }

        .content-container {
            max-width: 1000px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .topic-header {
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 24px;
        }

        .category-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--cyan);
            color: var(--cyan);
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        h1 {
            font-family: var(--font-mono);
            font-size: 2.5rem;
            color: white;
            margin-bottom: 16px;
        }

        .summary {
            font-size: 1.1rem;
            color: var(--text-dim);
            max-width: 800px;
        }

        /* Card Grids */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin: 32px 0;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 8px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--cyan);
            box-shadow: 0 0 20px var(--cyan-glow);
            transform: translateY(-2px);
        }

        .card h3 {
            font-family: var(--font-mono);
            color: var(--cyan);
            margin-bottom: 12px;
            font-size: 1rem;
        }

        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 64px;
            height: 64px;
            background: var(--bg-deep);
            border: 2px solid var(--cyan);
            color: var(--cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px var(--cyan-glow);
            transition: var(--transition);
            z-index: 1000;
        }

        .fab:hover {
            transform: scale(1.1) rotate(90deg);
            background: var(--cyan);
            color: var(--bg-deep);
        }

        /* Side Drawer */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            z-index: 10000;
        }

        .drawer {
            position: fixed;
            top: 0;
            right: -450px;
            width: 450px;
            height: 100%;
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border);
            padding: 40px;
            transition: transform 0.4s ease;
            z-index: 10001;
            overflow-y: auto;
        }

        .drawer.open {
            transform: translateX(-450px);
        }

        /* Responsive */
        @media (max-width: 900px) {
            aside { width: 0; position: absolute; left: -300px; }
            main { padding: 24px; }
            .drawer { width: 100%; right: -100%; }
            .drawer.open { transform: translateX(-100%); }
        }
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 4px 4px;
            display: none;
            max-height: 400px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .search-result-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: var(--transition);
        }

        .search-result-item:hover {
            background: rgba(0, 212, 255, 0.1);
        }

        .search-result-item:last-child {
            border-bottom: none;
        }
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 100000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--bg-card);
            border: 1px solid var(--cyan);
            border-left: 4px solid var(--cyan);
            padding: 12px 24px;
            border-radius: 4px;
            color: white;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            animation: slideIn 0.3s ease-out;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .tag-chip {
            display: inline-block;
            padding: 2px 10px;
            background: rgba(139, 148, 158, 0.1);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-right: 6px;
            margin-top: 8px;
            cursor: pointer;
            transition: var(--transition);
        }

        .tag-chip:hover {
            border-color: var(--cyan);
            color: var(--cyan);
        }

        #menuToggle {
            display: none;
            cursor: pointer;
            padding: 10px;
            margin-right: 15px;
        }

        @media (max-width: 900px) {
            #menuToggle { display: block; }
            aside.mobile-open { width: 300px; left: 0; z-index: 1000; }
        }

        .user-badge {
            background: var(--amber);
            color: black;
            font-size: 0.6rem;
            padding: 1px 4px;
            border-radius: 2px;
            font-weight: bold;
            margin-left: 8px;
            vertical-align: middle;
        }

        /* Analytical Highlights */
        .highlight-box {
            border-left: 2px solid var(--cyan);
            padding-left: 15px;
            margin: 20px 0;
            background: rgba(0, 212, 255, 0.02);
        }
    </style>
</head>
<body>
    <header>
        <div id="menuToggle">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2"><line x1="3" y1="12" x2="21" y1="12"></line><line x1="3" y1="6" x2="21" y1="6"></line><line x1="3" y1="18" x2="21" y1="18"></line></svg>
        </div>
        <div class="logo">DC TECH HUB</div>
        <div class="search-container">
            <input type="text" id="globalSearch" placeholder="SEARCH SYSTEM [KEYWORDS, CONCEPTS, STANDARDS]..." autocomplete="off">
            <div id="searchResults" class="search-results"></div>
        </div>
    </header>

    <div class="main-layout">
        <aside id="sidebar">
            <!-- Polled from JS -->
        </aside>
        
        <main id="contentArea">
            <div class="content-container">
                <!-- Welcome Screen / Topic Render -->
                <div class="topic-header">
                    <span class="category-badge">System Ready</span>
                    <h1>KNOWLEDGE BASE V1.0</h1>
                    <p class="summary">Select a category from the terminal on the left to begin data retrieval.</p>
                </div>
            </div>
        </main>
    </div>

    <button class="fab" id="addBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y1="19"></line><line x1="5" y1="12" x2="19" y1="12"></line></svg>
    </button>

    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="drawer" id="drawer">
        <h2 style="font-family: var(--font-mono); margin-bottom: 24px; color: var(--cyan); border-bottom: 1px solid var(--border); padding-bottom: 15px">+ DATA INJECTION</h2>
        
        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div>
                <label style="display: block; font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px">CATEGORY</label>
                <select id="newCat" style="width: 100%; background: var(--bg-deep); border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: 4px; font-family: var(--font-mono)">
                    <option value="networking-fundamentals">Networking Fundamentals</option>
                    <option value="physical-infrastructure">Physical Infrastructure</option>
                    <option value="cabling-connectivity">Cabling & Connectivity</option>
                    <option value="power-cooling">Power & Cooling</option>
                    <option value="monitoring-tools">Monitoring & Tools</option>
                </select>
            </div>

            <div>
                <label style="display: block; font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px">TOPIC NAME</label>
                <input type="text" id="newName" placeholder="e.g. BGP Best Practices" style="width: 100%; background: var(--bg-deep); border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: 4px; font-family: var(--font-sans); outline: none">
            </div>

            <div>
                <label style="display: block; font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px">IMAGE UPLOAD (PNG/JPG)</label>
                <input type="file" id="newFile" accept="image/*" style="width: 100%; background: var(--bg-deep); border: 1px solid var(--border); color: var(--text-dim); padding: 8px; border-radius: 4px; font-family: var(--font-mono); font-size: 0.8rem">
            </div>

            <div>
                <label style="display: block; font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px">PDF EMBED URL</label>
                <input type="text" id="newPDF" placeholder="https://example.com/spec.pdf" style="width: 100%; background: var(--bg-deep); border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: 4px; font-family: var(--font-sans); outline: none">
            </div>

            <div>
                <label style="display: block; font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px">TAGS (COMMA SEPARATED)</label>
                <input type="text" id="newTags" placeholder="SFP, Fiber, OS2" style="width: 100%; background: var(--bg-deep); border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: 4px; font-family: var(--font-sans); outline: none">
            </div>

            <div>
                <label style="display: block; font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px">NOTES (MARKDOWN SUPPORTED)</label>
                <textarea id="newNotes" rows="4" placeholder="Technical details..." style="width: 100%; background: var(--bg-deep); border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: 4px; font-family: var(--font-sans); resize: vertical; outline: none"></textarea>
            </div>

            <div>
                <label style="display: block; font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px">VIDEO LINK (YOUTUBE EMBED URL)</label>
                <input type="text" id="newVideo" placeholder="https://www.youtube.com/embed/..." style="width: 100%; background: var(--bg-deep); border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: 4px; font-family: var(--font-sans); outline: none">
            </div>

            <button id="saveBtn" style="margin-top: 20px; background: var(--cyan); color: var(--bg-deep); border: none; padding: 15px; border-radius: 4px; font-family: var(--font-mono); font-weight: 700; cursor: pointer; transition: var(--transition); box-shadow: 0 0 15px var(--cyan-glow)">
                INITIALIZE INJECTION
            </button>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const TECH_CONTENT = {
            "networking-fundamentals": {
                title: "Networking Fundamentals",
                topics: {
                    "osi-model": {
                        title: "OSI Model (Open Systems Interconnection)",
                        summary: "The Open Systems Interconnection model is a conceptual framework used to understand network interactions in seven distinct layers, ensuring interoperability between different communication systems.",
                        image: "./assets/dc_aisle.png",
                        concepts: [
                            { title: "Layer 7: Application", text: "Direct interaction with software applications. Use Case: Web browsing (HTTP), email (SMTP)." },
                            { title: "Layer 4: Transport", text: "Host-to-host communication. Use Case: Reliable data stream (TCP) vs. fast streaming (UDP)." },
                            { title: "Layer 3: Network", text: "Logical addressing and path determination. Use Case: Routing packets across different subnets using IP." },
                            { title: "Layer 2: Data Link", text: "Physical addressing (MAC). Use Case: Direct communication between devices on the same local switch." }
                        ],
                        diagram: "osi",
                        specs: [
                            ["Layer", "Name", "Data Unit", "Example Protocols"],
                            ["7", "Application", "Data", "HTTP, DNS, FTP, SNMP"],
                            ["6", "Presentation", "Data", "SSL, SSH, JPEG, ASCII"],
                            ["5", "Session", "Data", "RPC, Sockets, NetBIOS"],
                            ["4", "Transport", "Segment", "TCP, UDP, SCTP"],
                            ["3", "Network", "Packet", "IPv4, IPv6, ICMP, IPsec"],
                            ["2", "Data Link", "Frame", "Ethernet, PPP, Switch"],
                            ["1", "Physical", "Bit", "Cat6, Fiber, Hub"]
                        ],
                        related: ["TCP/IP", "VLANs", "LLDP"],
                        proTip: "Troubleshoot from the bottom up. If the Physical layer (L1) is down, no other layer will work."
                    },
                    "vlan": {
                        title: "VLAN (Virtual Local Area Network)",
                        summary: "VLANs partition a physical network into multiple logical segments, enhancing security and reducing broadcast traffic overhead.",
                        concepts: [
                            { title: "Logic Segmentation", text: "Separates traffic (e.g., Management vs. Data) without needing separate switches." },
                            { title: "802.1Q Tagging", text: "The IEEE standard for tagging frames with a VLAN ID as they move across trunk links." }
                        ],
                        related: ["802.1Q", "STP", "Trunking"]
                    },
                    "tcp-ip": {
                        title: "TCP/IP Stack (Transmission Control Protocol / Internet Protocol)",
                        summary: "The primary suite of protocols used for the modern internet, more streamlined than the OSI model.",
                        concepts: [
                            { title: "TCP (Transmission Control)", text: "Connection-oriented with error checking. Use Case: Database transfers, web pages." },
                            { title: "UDP (User Datagram)", text: "Connectionless, low overhead. Use Case: VoIP, Gaming, Video streaming." }
                        ],
                        related: ["OSI Model", "Subnetting"]
                    },
                    "subnetting": {
                        title: "Subnetting & CIDR (Classless Inter-Domain Routing)",
                        summary: "Dividing a network into sub-networks to optimize address space and improve routing efficiency.",
                        concepts: [
                            { title: "Subnet Mask", text: "Determines which part of the IP is the network vs. the host." },
                            { title: "CIDR Usage", text: "Allows for flexible allocation of IP addresses (e.g., /24 instead of fixed Class C)." }
                        ]
                    }
                }
            },
            "physical-infrastructure": {
                title: "Physical Infrastructure",
                topics: {
                    "rack-units": {
                        title: "Rack Units (U / RU)",
                        summary: "The standard unit of vertical space in data center racks. 1U = 1.75 inches (44.45 mm).",
                        image: "./assets/rack.png",
                        diagram: "rack",
                        concepts: [
                            { title: "EIA-310 Standard", text: "Defines the physical dimensions of the rack, holes, and mounting equipment." },
                            { title: "Density Management", text: "Balancing the number of servers per rack with available power and cooling." }
                        ],
                        specs: [
                            ["U Value", "Height (Inches)", "Height (mm)", "Common Equip"],
                            ["1U", "1.75\"", "44.45", "TOR Switch, Firewall"],
                            ["2U", "3.5\"", "88.9", "Standard Compute Server"],
                            ["4U", "7.0\"", "177.8", "Storage Arrays, GPU Enclosures"]
                        ]
                    },
                    "pdu": {
                        title: "PDU (Power Distribution Unit)",
                        summary: "Devices used to distribute power to computers and networking equipment within a rack.",
                        concepts: [
                            { title: "Intelligent PDU", text: "Provides remote outlet switching and real-time power monitoring." },
                            { title: "Phase Balance", text: "Ensuring load is distributed equally across 3-phase power feeds." }
                        ],
                        related: ["UPS", "ATS"]
                    }
                }
            },
            "cabling-connectivity": {
                title: "Cabling & Connectivity",
                topics: {
                    "fiber-optics": {
                        title: "Fiber Optic Connectivity",
                        summary: "Using light signals through glass strands to transmit data at extremely high speeds over long distances.",
                        image: "./assets/fiber.png",
                        diagram: "fiber",
                        concepts: [
                            { title: "SMF (Single-Mode)", text: "Long-range (kilometers). OS2 is the current standard." },
                            { title: "MMF (Multi-Mode)", text: "Short-range (meters). OM4/OM5 used for 100G+ intra-room." }
                        ],
                        specs: [
                            ["Standard", "Core Dia", "Bandwidth", "Max Reach"],
                            ["OS2", "9µm", "100Gb/s+", "40km"],
                            ["OM4", "50µm", "40Gb/s", "400m"],
                            ["OM5", "50µm", "Wideband", "400m"]
                        ],
                        related: ["Connectors", "SFP", "QSFP"]
                    },
                    "connectors": {
                        title: "Connector Types",
                        summary: "Standardized physical interfaces for fiber and copper cables.",
                        concepts: [
                            { title: "LC (Lucent Connector)", text: "Small form factor, standard for high-density fiber patching." },
                            { title: "MTP/MPO", text: "Multi-fiber Push On. Used for 40G/100G/400G trunking (12-24 fibers)." }
                        ],
                        related: ["Fiber Optics", "Transceivers"]
                    }
                }
            },
            "power-cooling": {
                title: "Power & Cooling",
                topics: {
                    "aisle-containment": {
                        title: "Aisle Containment Systems",
                        summary: "Separating hot exhaust air from cold supply air to maximize cooling efficiency.",
                        diagram: "cooling",
                        concepts: [
                            { title: "CAC", text: "Cold Aisle Containment. Efficiently delivers air to server intakes." },
                            { title: "HAC", text: "Hot Aisle Containment. Directly extracts hot air to CRACs." }
                        ],
                        proTip: "Raising supply temps by just 1 degree can save 2-3% in energy costs."
                    },
                    "pue": {
                        title: "PUE (Power Usage Effectiveness)",
                        summary: "The industry standard metric for measuring data center energy efficiency.",
                        concepts: [
                            { title: "Benchmark", text: "Ideal is 1.0. Modern hyperscale DCs achieve 1.1-1.2." },
                            { title: "Components", text: "Includes power used by cooling, lighting, and UPS losses." }
                        ]
                    }
                }
            },
            "monitoring-tools": {
                title: "Monitoring & Tools",
                topics: {
                    "snmp": {

        let userContent = JSON.parse(localStorage.getItem('dc_user_content') || '[]');

        function init() {
            renderSidebar();
            setupEventListeners();
        }

        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = '';

            for (const [catId, category] of Object.entries(TECH_CONTENT)) {
                const catEl = document.createElement('div');
                catEl.className = 'nav-category';
                catEl.id = `cat-${catId}`;

                let topicsHTML = '';
                if (category.topics) {
                    for (const [topicId, topic] of Object.entries(category.topics)) {
                        topicsHTML += `<div class="nav-topic-link" data-path="${catId}/${topicId}">${topic.title}</div>`;
                    }
                } else if (category.isGlossary) {
                    topicsHTML += `<div class="nav-topic-link" data-path="${catId}/main">Full Glossary</div>`;
                }

                // Append user content for this category
                const catUserContent = userContent.filter(c => c.category === catId);
                catUserContent.forEach((uc, index) => {
                    topicsHTML += `<div class="nav-topic-link" data-user="true" data-index="${index}">${uc.name} <span style="font-size: 10px; color: var(--amber)">*</span></div>`;
                });

                catEl.innerHTML = `
                    <div class="nav-category-header" onclick="toggleCategory('${catId}')">
                        ${category.title}
                        <span>+</span>
                    </div>
                    <div class="nav-topics">${topicsHTML}</div>
                `;
                sidebar.appendChild(catEl);
            }
        }

        function toggleCategory(catId) {
            const el = document.getElementById(`cat-${catId}`);
            el.classList.toggle('active');
            const icon = el.querySelector('span');
            icon.textContent = el.classList.contains('active') ? '-' : '+';
        }

        function setupEventListeners() {
            // Navigation clicks
            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('nav-topic-link')) {
                    const path = e.target.getAttribute('data-path');
                    const isUser = e.target.getAttribute('data-user') === 'true';
                    
                    document.querySelectorAll('.nav-topic-link').forEach(l => l.classList.remove('active'));
                    e.target.classList.add('active');

                    if (isUser) {
                        const index = e.target.getAttribute('data-index');
                        renderUserTopic(userContent[index]);
                    } else if (path) {
                        const [catId, topicId] = path.split('/');
                        renderTopic(catId, topicId);
                    }
                }
            });

            // Search functionality
            const searchInput = document.getElementById('globalSearch');
            const searchResults = document.getElementById('searchResults');

            searchInput.oninput = (e) => {
                const query = e.target.value.toLowerCase();
                if (!query) {
                    searchResults.innerHTML = '';
                    searchResults.style.display = 'none';
                    return;
                }

                let matches = [];
                for (const [catId, category] of Object.entries(TECH_CONTENT)) {
                    if (category.topics) {
                        for (const [topicId, topic] of Object.entries(category.topics)) {
                            if (topic.title.toLowerCase().includes(query) || topic.summary.toLowerCase().includes(query)) {
                                matches.push({ title: topic.title, cat: category.title, path: `${catId}/${topicId}` });
                            }
                        }
                    }
                    if (category.isGlossary) {
                        for (const [term, def] of Object.entries(category.terms)) {
                            if (term.toLowerCase().includes(query) || def.toLowerCase().includes(query)) {
                                matches.push({ title: `Term: ${term}`, cat: "Glossary", path: "glossary/main" });
                            }
                        }
                    }
                }
                userContent.forEach((uc, index) => {
                    if (uc.name.toLowerCase().includes(query)) {
                        matches.push({ title: uc.name, cat: "User Content", userIndex: index });
                    }
                });

                if (matches.length > 0) {
                    searchResults.innerHTML = matches.slice(0, 10).map(m => `
                        <div class="search-result-item" onclick="${m.userIndex !== undefined ? `viewUser(${m.userIndex})` : `viewTopic('${m.path}')`}">
                            <div style="font-family: var(--font-mono); color: var(--cyan)">${m.title}</div>
                            <div style="font-size: 0.7rem; color: var(--text-dim)">${m.cat}</div>
                        </div>
                    `).join('');
                    searchResults.style.display = 'block';
                } else {
                    searchResults.innerHTML = '<div style="padding: 10px; color: var(--text-dim)">No matches found in database.</div>';
                    searchResults.style.display = 'block';
                }
            };

            // Floating Button & Drawer
            document.getElementById('addBtn').onclick = () => {
                document.getElementById('drawer').classList.add('open');
                document.getElementById('drawerOverlay').style.display = 'block';
            };

            document.getElementById('drawerOverlay').onclick = () => {
                document.getElementById('drawer').classList.remove('open');
                document.getElementById('drawerOverlay').style.display = 'none';
            };

            // Save User Content
            document.getElementById('saveBtn').onclick = () => {
                const name = document.getElementById('newName').value;
                const category = document.getElementById('newCat').value;
                const notes = document.getElementById('newNotes').value;
                const video = document.getElementById('newVideo').value;

                if (!name) { alert("Topic name required."); return; }

                const newItem = { name, category, notes, video, timestamp: Date.now() };
                userContent.push(newItem);
                localStorage.setItem('dc_user_content', JSON.stringify(userContent));

                document.getElementById('drawer').classList.remove('open');
                document.getElementById('drawerOverlay').style.display = 'none';
                
                document.getElementById('newName').value = '';
                document.getElementById('newNotes').value = '';
                document.getElementById('newVideo').value = '';

                renderSidebar();
                renderUserTopic(newItem);
            };
        }

        function viewTopic(path) {
            const [catId, topicId] = path.split('/');
            renderTopic(catId, topicId);
            document.getElementById('searchResults').style.display = 'none';
            document.getElementById('globalSearch').value = '';
        }
        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function renderTopic(catId, topicId) {

            const isUserGenerated = topic.isUserAdded;
            
            let html = `

                        ${topic.tags ? `

                    ${topic.diagram ? `

                            <div class="video-container">
                                <iframe width="560" height="315" src="${topic.video}" frameborder="0" allowfullscreen></iframe>
                            </div>
                        </div>
                    ` : ''}

                    ${topic.related ? `
                        <div style="margin-top: 40px">
                            <h4 style="font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-dim); margin-bottom: 12px">RELATED CONCEPTS</h4>
                            <div>
                                ${topic.related.map(r => `<span class="tag-chip" onclick="executeSearch('${r}')">${r}</span>`).join('')}
                            </div>
                        </div>
                    ` : ''}

                    ${topic.proTip ? `
                        <div style="margin-top: 40px; padding: 24px; border-left: 4px solid var(--amber); background: rgba(245, 158, 11, 0.05); border-radius: 0 8px 8px 0">
                            <h4 style="color: var(--amber); font-family: var(--font-mono); margin-bottom: 8px; letter-spacing: 1px">FIELD ENGINEER PRO-TIP</h4>
                            <p>${topic.proTip}</p>
                        </div>
                    ` : ''}
                </div>
            `;
            contentArea.innerHTML = html;
            window.scrollTo(0,0);
            
            if (topic.diagram) renderDiagram(topic.diagram);
        }

        window.executeSearch = (term) => {
            const searchInput = document.getElementById('globalSearch');
            searchInput.value = term;
            searchInput.dispatchEvent(new Event('input'));
            if (window.innerWidth <= 900) {
                document.querySelector('aside').classList.remove('mobile-open');
            }
        };

        function renderGlossary() {
            const contentArea = document.getElementById('contentArea');
            const sortedTerms = Object.keys(TECH_CONTENT.glossary.terms).sort();
            
            let html = `
                <div class="content-container">
                    <div class="topic-header">
                        <span class="category-badge">Reference</span>
                        <h1>Technical Glossary</h1>
                        <p class="summary">Comprehensive A-Z index of data center networking, infrastructure, and protocol terminology.</p>
                    </div>
                    <div class="glossary-grid">
                        ${sortedTerms.map(term => `
                            <div class="glossary-item">
                                <div class="term">${term}</div>
                                <div class="definition">${TECH_CONTENT.glossary.terms[term]}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            contentArea.innerHTML = html;
            window.scrollTo(0,0);
        }

        function setupEventListeners() {
            document.querySelectorAll('.cat-name').forEach(header => {
                header.addEventListener('click', () => {
                    const parent = header.parentElement;
                    const isOpen = parent.classList.contains('active');
                    document.querySelectorAll('.sidebar-category').forEach(c => c.classList.remove('active'));
                    if (!isOpen) parent.classList.add('active');
                });
            });

            document.querySelectorAll('.topic-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    const catId = link.dataset.cat;
                    const topicId = link.dataset.topic;
                    renderTopic(catId, topicId);
                    
                    document.querySelectorAll('.topic-link').forEach(l => l.classList.remove('active'));
                    link.classList.add('active');

                    if (window.innerWidth <= 900) {
                        document.querySelector('aside').classList.remove('mobile-open');
                    }
                });
            });

            document.getElementById('menuToggle').addEventListener('click', () => {
                document.querySelector('aside').classList.toggle('mobile-open');
            });

            const searchInput = document.getElementById('globalSearch');
            const searchResults = document.getElementById('searchResults');

            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase().trim();
                if (term.length < 2) {
                    searchResults.style.display = 'none';
                    return;
                }

                let matches = [];
                Object.keys(TECH_CONTENT).forEach(catId => {
                    const cat = TECH_CONTENT[catId];
                    if (cat.topics) {
                        Object.keys(cat.topics).forEach(topicId => {
                            const topic = cat.topics[topicId];
                            if (topic.title.toLowerCase().includes(term) || topic.summary.toLowerCase().includes(term)) {
                                matches.push({ title: topic.title, catId, topicId, type: 'Topic' });
                            }
                        });
                    }
                    if (cat.terms) {
                        Object.keys(cat.terms).forEach(termKey => {
                            if (termKey.toLowerCase().includes(term)) {
                                matches.push({ title: termKey, catId, topicId: 'glossary', type: 'Glossary' });
                            }
                        });
                    }
                });

                if (matches.length > 0) {
                    searchResults.innerHTML = matches.slice(0, 8).map(m => `
                        <div class="search-result-item" onclick="handleSearchClick('${m.catId}', '${m.topicId}')">
                            <span style="color: var(--cyan); font-size: 0.7rem; font-family: var(--font-mono)">[${m.type}]</span>
                            ${m.title}
                        </div>
                    `).join('');
                    searchResults.style.display = 'block';
                } else {
                    searchResults.style.display = 'none';
                }
            });

            window.handleSearchClick = (catId, topicId) => {
                if (topicId === 'glossary') {
                    renderGlossary();
                } else {
                    renderTopic(catId, topicId);
                }
                document.getElementById('globalSearch').value = '';
                searchResults.style.display = 'none';
            };

            const fab = document.getElementById('fab');
            const drawer = document.getElementById('drawer');
            const closeDrawer = document.getElementById('closeDrawer');
            const saveBtn = document.getElementById('saveBtn');

            fab.addEventListener('click', () => drawer.classList.add('open'));
            closeDrawer.addEventListener('click', () => drawer.classList.remove('open'));

            saveBtn.addEventListener('click', async () => {
                const name = document.getElementById('newName').value;
                const notes = document.getElementById('newNotes').value;
                const video = document.getElementById('newVideo').value;
                const pdf = document.getElementById('newPDF').value;
                const tagsRaw = document.getElementById('newTags').value;
                const fileInput = document.getElementById('newFile');
                
                if (!name || !notes) {
                    showToast("ERROR: TOPIC NAME AND NOTES ARE REQUIRED");
                    return;
                }

                let imageData = '';
                if (fileInput.files && fileInput.files[0]) {
                    const reader = new FileReader();
                    imageData = await new Promise(resolve => {
                        reader.onload = (e) => resolve(e.target.result);
                        reader.readAsDataURL(fileInput.files[0]);
                    });
                }

                const newTopic = {
                    title: name,
                    summary: notes.substring(0, 100) + "...",
                    concepts: [{ title: "User Contribution", text: notes }],
                    video: video || null,
                    image: imageData || null,
                    pdf: pdf || null,
                    tags: tagsRaw ? tagsRaw.split(',').map(t => t.trim()) : [],
                    isUserAdded: true
                };

                const userContent = JSON.parse(localStorage.getItem('dc_user_content') || '[]');
                userContent.push(newTopic);
                localStorage.setItem('dc_user_content', JSON.stringify(userContent));

                injectUserContentToSidebar();
                drawer.classList.remove('open');
                showToast("SUCCESS: BLOCK INJECTED TO VENDOR TECHNOLOGIES");
                
                document.getElementById('newName').value = '';
                document.getElementById('newNotes').value = '';
                document.getElementById('newVideo').value = '';
                document.getElementById('newPDF').value = '';
                document.getElementById('newTags').value = '';
                document.getElementById('newFile').value = '';
            });
        }

        function injectUserContentToSidebar() {
            const container = document.getElementById('user-topics-container');
            const userContent = JSON.parse(localStorage.getItem('dc_user_content') || '[]');
            
            TECH_CONTENT['vendor-technologies'].topics = {}; 
            
            if (userContent.length === 0) {
                container.innerHTML = '<div style="padding: 10px 24px; font-size: 0.75rem; color: var(--text-dim); font-style: italic">No user modules detected...</div>';
                return;
            }

            container.innerHTML = userContent.map((topic, idx) => {
                const topicId = `user-${idx}`;
                TECH_CONTENT['vendor-technologies'].topics[topicId] = topic;
                return `
                    <div class="topic-link" data-cat="vendor-technologies" data-topic="${topicId}">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px"><path d="M12 20v-6M9 20V10M15 20V4M6 20v-4M18 20V8"></path></svg>
                        ${topic.title}
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.topic-link').forEach(link => {
                link.onclick = () => {
                    const catId = link.dataset.cat;
                    const topicId = link.dataset.topic;
                    renderTopic(catId, topicId);
                    document.querySelectorAll('.topic-link').forEach(l => l.classList.remove('active'));
                    link.classList.add('active');
                };
            });
        }

        setupEventListeners();
        injectUserContentToSidebar();
        renderTopic('networking-fundamentals', 'osi-model');
    </script>
</body>
</html>
