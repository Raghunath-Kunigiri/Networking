<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Playground | Fun & Clear Guide to Computer Networks</title>
    <meta name="description" content="Learn computer networks easily with interactive animations, simple analogies for kids, and full technical specs for grown-ups.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Grown-up / Tech Mode Palette */
            --bg-deep: #090d16;
            --bg-card: rgba(16, 22, 37, 0.65);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.35);
            --accent-sec: #f59e0b;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --border-radius: 12px;
        }

        /* Kid Mode Theme Variables Override */
        body.kid-mode {
            --bg-deep: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.12);
            --accent: #f43f5e; /* Vibrant Rose */
            --accent-glow: rgba(244, 63, 94, 0.4);
            --accent-sec: #10b981; /* Bouncy emerald green */
            --text-main: #f8fafc;
            --text-dim: #cbd5e1;
            --border-radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-main);
            line-height: 1.6;
            overflow-x: hidden;
            transition: background-color 0.5s ease, color 0.3s ease;
        }

        /* Subtle grid background */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255, 0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
        }

        /* Layout */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Style */
        aside {
            width: 280px;
            background-color: rgba(6, 9, 16, 0.95);
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            transition: var(--transition);
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-header .logo-container {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent-sec));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--accent-glow);
            font-size: 1.2rem;
            animation: bounceLogo 3s infinite ease-in-out;
        }

        @keyframes bounceLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .sidebar-header h2 {
            font-family: var(--font-mono);
            font-size: 0.95rem;
            letter-spacing: -0.5px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .nav-section {
            padding: 16px 0;
        }

        .nav-category {
            margin-bottom: 6px;
        }

        .nav-category-header {
            padding: 12px 24px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .nav-category-header:hover {
            color: var(--accent);
            background: rgba(255, 255, 255, 0.02);
        }

        .nav-topics {
            display: none;
            padding-bottom: 8px;
            border-left: 2px solid var(--border);
            margin-left: 30px;
        }

        .nav-category.active .nav-topics {
            display: block;
        }

        .nav-topic-link {
            padding: 8px 16px;
            font-size: 0.9rem;
            color: var(--text-dim);
            cursor: pointer;
            transition: var(--transition);
            border-radius: 6px;
            margin: 2px 10px;
        }

        .nav-topic-link:hover {
            background-color: rgba(255, 255, 255, 0.03);
            color: var(--accent);
        }

        .nav-topic-link.active {
            color: var(--accent);
            font-weight: 600;
            background-color: rgba(255, 255, 255, 0.05);
            box-shadow: inset 3px 0 0 var(--accent);
        }

        /* Top Navigation Header */
        .top-nav {
            position: fixed;
            top: 0;
            right: 0;
            left: 280px;
            height: 70px;
            background: rgba(9, 13, 22, 0.75);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 40px;
            justify-content: space-between;
            z-index: 90;
            transition: var(--transition);
        }

        .mobile-menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--accent);
            font-size: 24px;
            cursor: pointer;
        }

        .search-container {
            position: relative;
            width: 320px;
        }

        .search-container input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 8px 16px 8px 36px;
            color: var(--text-main);
            font-family: var(--font-main);
            font-size: 0.85rem;
            outline: none;
            transition: var(--transition);
        }

        .search-container input:focus {
            border-color: var(--accent);
            background: rgba(255,255,255,0.07);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .search-container .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #101625;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-top: 6px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 200;
        }

        .search-result-item {
            padding: 10px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.85rem;
        }

        .search-result-item:hover {
            background: rgba(255,255,255,0.05);
            color: var(--accent);
        }

        /* Dual-Mode Toggle Switch Styling */
        .toggle-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.04);
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid var(--border);
        }

        .toggle-label {
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .toggle-label.active {
            color: var(--accent);
            text-shadow: 0 0 8px var(--accent-glow);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.15);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: #fff;
            transition: .4s;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        input:checked + .slider {
            background-color: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        /* Main Content Area */
        main {
            flex: 1;
            margin-left: 280px;
            padding: 100px 40px 40px 40px;
            max-width: 1300px;
            transition: var(--transition);
        }

        .content-container {
            animation: fadeIn 0.4s ease-out;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .topic-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 24px;
        }

        .topic-header h1 {
            font-size: 2.4rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .category-badge {
            display: inline-block;
            padding: 4px 14px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            border: 1px solid var(--accent);
            border-radius: 20px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .topic-summary {
            font-size: 1.1rem;
            color: var(--text-dim);
            max-width: 900px;
        }

        /* Analogy Card Styling (Kid Mode) */
        .analogy-card {
            background: linear-gradient(135deg, var(--bg-card), rgba(255,255,255,0.01));
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            padding: 30px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .analogy-card::before {
            content: "💡";
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 4rem;
            opacity: 0.06;
            transform: rotate(15deg);
        }

        .analogy-card h3 {
            font-size: 1.4rem;
            color: var(--accent-sec);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .analogy-card p {
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text-main);
        }

        /* Specs card for Tech Mode */
        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .spec-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            padding: 24px;
            transition: var(--transition);
        }

        .spec-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .spec-card h3 {
            font-family: var(--font-mono);
            color: var(--accent);
            font-size: 1rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Diagram / Animation Canvas Area */
        .diagram-outer {
            background: #04060b;
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
        }

        .diagram-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 12px;
        }

        .diagram-header h4 {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }

        .diagram-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .control-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 16px;
            border-radius: 20px;
            font-family: var(--font-main);
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .control-btn:hover {
            background: var(--accent);
            color: #000;
            font-weight: 600;
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .diagram-canvas {
            width: 100%;
            min-height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
        }

        /* YouTube Container */
        .video-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .video-section h3 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
        }

        .video-wrapper {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Interactive slide toggle inside animations */
        .parameter-slider {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .parameter-slider input[type="range"] {
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* Floating action button to add content */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent), var(--accent-sec));
            color: #000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 20px var(--accent-glow);
            z-index: 1000;
            transition: var(--transition);
            font-size: 24px;
            font-weight: bold;
            border: none;
        }

        .fab:hover {
            transform: scale(1.1) rotate(90deg);
        }

        /* Drawer overlays */
        .drawer-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            z-index: 1500;
            display: none;
            animation: fadeInSimple 0.25s ease;
        }

        .drawer {
            position: fixed;
            top: 0;
            right: -550px;
            width: 550px;
            height: 100vh;
            background: #0e1321;
            border-left: 1px solid var(--border);
            z-index: 2000;
            padding: 36px;
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            overflow-y: auto;
            box-shadow: -10px 0 40px rgba(0,0,0,0.6);
        }

        .drawer.open {
            right: 0;
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 12px;
        }

        .drawer-header h3 {
            font-family: var(--font-mono);
            color: var(--accent);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 28px;
            cursor: pointer;
            transition: var(--transition);
        }

        .close-btn:hover {
            color: #fff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 10px 14px;
            color: var(--text-main);
            border-radius: 8px;
            font-family: var(--font-main);
            outline: none;
            transition: var(--transition);
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--accent);
            background: rgba(255,255,255,0.06);
        }

        .save-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-sec));
            color: #000;
            border: none;
            width: 100%;
            padding: 14px;
            font-family: var(--font-main);
            font-weight: 700;
            font-size: 0.95rem;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .save-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* Toast notifications */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
        }

        .toast {
            background: #162238;
            border: 1px solid var(--accent);
            color: #fff;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 0.85rem;
            box-shadow: 0 4px 20px var(--accent-glow);
            margin-bottom: 8px;
            animation: toastIn 0.3s ease forwards;
        }

        @keyframes toastIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeInSimple {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* General specs table styling */
        .tech-table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .tech-table th, .tech-table td {
            border: 1px solid var(--border);
            padding: 10px 12px;
            text-align: left;
        }

        .tech-table th {
            color: var(--accent);
            background: rgba(255,255,255,0.02);
            font-weight: bold;
        }

        /* Responsive design adjustments */
        @media (max-width: 990px) {
            aside {
                left: -280px;
            }
            aside.mobile-open {
                left: 0;
            }
            main {
                margin-left: 0;
                padding: 100px 20px 20px 20px;
            }
            .top-nav {
                left: 0;
                padding: 0 20px;
            }
            .mobile-menu-toggle {
                display: block;
            }
            .search-container {
                width: 180px;
            }
            .drawer {
                width: 100%;
                right: -100%;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside id="sidebar-nav">
            <div class="sidebar-header">
                <div class="logo-container">🌐</div>
                <h2>NetPlayground</h2>
            </div>
            <nav class="nav-section" id="sidebar-container">
                <!-- Dynamically populated from JS content database -->
            </nav>
        </aside>

        <!-- Top Navigation -->
        <div class="top-nav">
            <button class="mobile-menu-toggle" id="menuToggle" aria-label="Toggle Navigation Menu">☰</button>
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="globalSearch" placeholder="Search topic (e.g. TCP, Fiber)...">
                <div class="search-results" id="searchResults"></div>
            </div>

            <!-- Kid / Grown-up Mode Toggle Switch -->
            <div class="toggle-wrapper">
                <span class="toggle-label active" id="label-kid">👶 Analogy Mode</span>
                <label class="switch">
                    <input type="checkbox" id="modeToggle" checked>
                    <span class="slider"></span>
                </label>
                <span class="toggle-label" id="label-grownup">💻 Grown-up Tech</span>
            </div>
        </div>

        <!-- Main Content Area -->
        <main id="contentArea">
            <div style="display: flex; justify-content: center; align-items: center; height: 50vh; color: var(--accent); font-family: var(--font-mono);">
                CONNECTING PLAYGROUND NETWORKS...
            </div>
        </main>
    </div>

    <!-- Floating Action Button to Add Technical Content -->
    <button class="fab" id="addBtn" aria-label="Add custom topic">+</button>

    <!-- Content Injection Drawer -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="drawer" id="drawer">
        <div class="drawer-header">
            <h3>INJECT CUSTOM NETWORK MODULE</h3>
            <button class="close-btn" id="closeDrawer">&times;</button>
        </div>
        
        <div class="form-group">
            <label>Topic Name</label>
            <input type="text" id="newName" placeholder="e.g. Home Wi-Fi Setup">
        </div>

        <div class="form-group">
            <label>Category Group</label>
            <select id="newCat">
                <option value="fundamentals">How We Talk (Fundamentals)</option>
                <option value="physical">The Roads & Cables (Physical)</option>
                <option value="rules">Playground Rules (Protocols)</option>
                <option value="routing">Traffic Control (Routing)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Kid-friendly Story (Analogy)</label>
            <textarea id="newStory" rows="4" placeholder="Explain it simply like a playground game or toy story..."></textarea>
        </div>

        <div class="form-group">
            <label>Technical Details / Grown-up Facts</label>
            <textarea id="newSpecs" rows="5" placeholder="Enter standard specifications, byte sizes, configuration parameters, or notes..."></textarea>
        </div>

        <div class="form-group">
            <label>YouTube Embed Link</label>
            <input type="text" id="newVideo" placeholder="https://www.youtube.com/embed/...">
        </div>

        <div class="form-group">
            <label>Tags (Comma separated)</label>
            <input type="text" id="newTags" placeholder="WiFi, Cables, Rules">
        </div>

        <button class="save-btn" id="saveBtn">INJECT TO SYSTEM</button>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>

        // Keep track of the playground active session time
        function startSessionUptime() {
            let seconds = 0;
            const el = document.getElementById('searchResults'); // We will just insert uptime indicator in top-nav
            const uptimeContainer = document.createElement('div');
            uptimeContainer.style.fontSize = "0.75rem";
            uptimeContainer.style.color = "var(--text-dim)";
            uptimeContainer.style.fontFamily = "var(--font-mono)";
            uptimeContainer.id = "session-uptime";
            uptimeContainer.innerText = "PLAYGROUND UPTIME: 00:00";
            document.querySelector('.top-nav').appendChild(uptimeContainer);

            setInterval(() => {
                seconds++;
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                uptimeContainer.innerText = `PLAYGROUND UPTIME: ${m}:${s}`;
            }, 1000);
        }

        // Render Sidebar Navigation
        function renderSidebar() {
            const container = document.getElementById('sidebar-container');
            container.innerHTML = '';

            // Render core content categories
            for (const [catId, category] of Object.entries(TECH_CONTENT)) {
                const catEl = document.createElement('div');
                catEl.className = `nav-category ${catId === currentCategory ? 'active' : ''}`;
                catEl.id = `cat-${catId}`;

                let topicsHTML = '';
                if (category.topics) {
                    for (const [topicId, topic] of Object.entries(category.topics)) {
                        const activeClass = (catId === currentCategory && topicId === currentTopic) ? 'active' : '';
                        topicsHTML += `<div class="nav-topic-link ${activeClass}" data-cat="${catId}" data-topic="${topicId}">${topic.title}</div>`;
                    }
                } else if (category.isGlossary) {
                    const activeClass = (catId === currentCategory) ? 'active' : '';
                    topicsHTML += `<div class="nav-topic-link ${activeClass}" data-cat="${catId}" data-topic="main">Full Glossary</div>`;
                }

                // Append any custom injected user content under their categories
                const userTopics = userContent.filter(t => t.category === catId);
                userTopics.forEach((ut, index) => {
                    const topicIndexId = `user-${index}`;
                    const activeClass = (currentTopic === topicIndexId) ? 'active' : '';
                    topicsHTML += `<div class="nav-topic-link ${activeClass}" data-user="true" data-index="${index}" data-cat="${catId}">${ut.title} ⭐️</div>`;
                });

                catEl.innerHTML = `
                    <div class="nav-category-header" onclick="toggleCategory('${catId}')">
                        ${category.title}
                        <span>${catId === currentCategory ? '−' : '+'}</span>
                    </div>
                    <div class="nav-topics" style="display: ${catId === currentCategory ? 'block' : 'none'};">${topicsHTML}</div>
                `;
                container.appendChild(catEl);
            }
        }

        window.toggleCategory = (catId) => {
            const categories = document.querySelectorAll('.nav-category');
            categories.forEach(cat => {
                if (cat.id === `cat-${catId}`) {
                    const isActive = cat.classList.toggle('active');
                    const topicsDiv = cat.querySelector('.nav-topics');
                    topicsDiv.style.display = isActive ? 'block' : 'none';
                    cat.querySelector('.nav-category-header span').innerText = isActive ? '−' : '+';
                }
            });
        };

        // Render main content area based on current selection and Mode (Kid vs Grownup)
        function renderContent() {
            // Stop any running animation loop
            cancelAllAnimations();

            const isKidMode = document.getElementById('modeToggle').checked;
            const contentArea = document.getElementById('contentArea');

            // Apply theme switch styling to body
            if (isKidMode) {
                document.body.classList.add('kid-mode');
                document.getElementById('label-kid').classList.add('active');
                document.getElementById('label-grownup').classList.remove('active');
            } else {
                document.body.classList.remove('kid-mode');
                document.getElementById('label-kid').classList.remove('active');
                document.getElementById('label-grownup').classList.add('active');
            }

            // Handle Custom Injected user topics
            if (currentTopic.startsWith('user-')) {
                const index = parseInt(currentTopic.split('-')[1]);
                const data = userContent[index];
                if (!data) return;
                renderUserModule(data, isKidMode);
                return;
            }

            // Handle Glossary
            if (currentCategory === 'glossary') {
                renderGlossary();
                return;
            }

            const category = TECH_CONTENT[currentCategory];
            const topic = category.topics[currentTopic];
            if (!topic) return;

            let html = `<div class="content-container">`;

            // Badge & Headers
            html += `
                <div class="topic-header">
                    <span class="category-badge">${category.title}</span>
                    <h1 id="main-title">${isKidMode ? (topic.kidTitle || topic.title) : topic.title}</h1>
                    <p class="topic-summary">${topic.summary}</p>
                </div>
            `;

            // Mode Content Swap
            if (isKidMode) {
                html += `
                    <div class="analogy-card" id="kid-explanation">
                        <h3>💡 The Kid Analogy Story</h3>
                        <p>${topic.kidStory.replace(/\n/g, '<br><br>')}</p>
                    </div>
                `;
            } else {
                html += `
                    <div class="specs-grid" id="grownup-explanation">
                        <div class="spec-card">
                            <h3>⚙️ Technical Architecture</h3>
                            <div style="font-size: 0.95rem; line-height: 1.6;">
                                ${Object.entries(topic.grownupSpecs).map(([key, val]) => `<strong>${key}</strong>: ${val}<br><br>`).join('')}
                            </div>
                        </div>
                        
                        ${topic.techSpecsTable ? `
                            <div class="spec-card">
                                <h3>📊 Specification Details</h3>
                                <table class="tech-table">
                                    <thead>
                                        <tr>
                                            ${topic.techSpecsTable[0].map(th => `<th>${th}</th>`).join('')}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${topic.techSpecsTable.slice(1).map(row => `
                                            <tr>
                                                ${row.map(td => `<td>${td}</td>`).join('')}
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        ` : ''}
                    </div>
                `;
            }

            // Animation Canvas Area
            if (topic.diagram) {
                html += `
                    <div class="diagram-outer">
                        <div class="diagram-header">
                            <h4>🎮 INTERACTIVE DIGITAL PLAYGROUND</h4>
                            <div class="diagram-controls" id="canvas-controllers">
                                <!-- Dynamic JS controls get loaded here -->
                            </div>
                        </div>
                        <div class="diagram-canvas" id="canvas-container">
                            <!-- Injected SVG/Canvas -->
                        </div>
                    </div>
                `;
            }

            // Youtube Embed section
            if (topic.video) {
                html += `
                    <div class="video-section">
                        <h3>🎬 Watch and Learn (Video)</h3>
                        <div class="video-wrapper">
                            <iframe id="youtube-frame" src="${topic.video}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        </div>
                    </div>
                `;
            }

            html += `</div>`;
            contentArea.innerHTML = html;

            // Initialize Diagram
            if (topic.diagram) {
                initDiagram(topic.diagram);
            }
        }

        // Render standard User Contributed Module
        function renderUserModule(data, isKidMode) {
            const contentArea = document.getElementById('contentArea');
            let html = `
                <div class="content-container">
                    <div class="topic-header">
                        <span class="category-badge">User Injected Module</span>
                        <h1>${data.title}</h1>
                        <p class="topic-summary">Custom contribution loaded into Local Sandbox storage.</p>
                    </div>

                    <div class="analogy-card">
                        <h3>${isKidMode ? '👶 Kid Analogy' : '💻 Technical Details'}</h3>
                        <p style="white-space: pre-wrap;">${isKidMode ? (data.story || data.notes) : data.notes}</p>
                    </div>
            `;

            if (data.video) {
                let videoEmbed = data.video;
                if (videoEmbed.includes("watch?v=")) {
                    videoEmbed = videoEmbed.replace("watch?v=", "embed/");
                }
                html += `
                    <div class="video-section">
                        <h3>🎬 Attached Video Reference</h3>
                        <div class="video-wrapper">
                            <iframe src="${videoEmbed}" allowfullscreen></iframe>
                        </div>
                    </div>
                `;
            }

            html += `</div>`;
            contentArea.innerHTML = html;
        }

            // Watch the Mode toggle
            document.getElementById('modeToggle').onchange = () => {
                renderContent();

                    searchResults.style.display = 'none';

                }

                let matches = [];
                Object.entries(TECH_CONTENT).forEach(([catId, cat]) => {
                    if (cat.topics) {
                        Object.entries(cat.topics).forEach(([topicId, topic]) => {
                            if (topic.title.toLowerCase().includes(q) || (topic.kidTitle && topic.kidTitle.toLowerCase().includes(q))) {
                                matches.push({

                                        renderContent();

                                });

                });

                    <path d="M322 100 L478 100" stroke="#334155" stroke-width="2" id="l-r1-r3"/>

            let isPacketMode = true;
            const toggleBtn = document.getElementById('btn-toggle-switch');

            toggleBtn.onclick = () => {
                isPacketMode = !isPacketMode;
                toggleBtn.textContent = isPacketMode ? "Mode: Packet Switching" : "Mode: Circuit Switching";
                statusEl.innerText = isPacketMode ? "Puzzle mode: pieces travel independently." : "Train mode: locked path established first.";
                resetLinks();
            };

            function resetLinks() {
                const links = ["l-s-r1", "l-s-r2", "l-r1-r3", "l-r1-r4", "l-r2-r3", "l-r2-r4", "l-r3-rec", "l-r4-rec"];
                links.forEach(id => {
                    document.getElementById(id).setAttribute('stroke', '#334155');
                    document.getElementById(id).setAttribute('stroke-width', '2');
                });
                packetsGroup.innerHTML = '';
            }

            let timers = [];
            sendBtn.onclick = () => {
                sendBtn.disabled = true;
                toggleBtn.disabled = true;
                resetLinks();
                
                timers.forEach(clearTimeout);
                timers = [];

                if (!isPacketMode) {
                    // Circuit switching: establish connection
                    statusEl.innerText = "1. Reserving dedicated path (R1 -> R3)...";
                    const route = ["l-s-r1", "l-r1-r3", "l-r3-rec"];
                    
                    route.forEach((id, index) => {
                        timers.push(setTimeout(() => {
                            const link = document.getElementById(id);
                            link.setAttribute('stroke', '#f59e0b');
                            link.setAttribute('stroke-width', '4');
                        }, index * 400));
                    });

                    timers.push(setTimeout(() => {
                        statusEl.innerText = "2. Path locked. Sending file continuously...";
                        // Stream circles along path
                        for(let i=0; i<15; i++) {
                            timers.push(setTimeout(() => {
                                const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                                dot.setAttribute("r", "5");
                                dot.setAttribute("fill", "#10b981");
                                packetsGroup.appendChild(dot);
                                animateDotAlongPath(dot, [

                                    {x: 300, y: 100},
                                    {x: 500, y: 100},
                                    {x: 700, y: 190}
                                ], 1000);
                            }, i * 150));
                        }
                    }, 1300));

                    timers.push(setTimeout(() => {
                        statusEl.innerText = "3. Transmission done. Releasing reserved tracks.";
                        resetLinks();
                        sendBtn.disabled = false;
                        toggleBtn.disabled = false;
                    }, 4500));

                } else {
                    // Packet switching: send independently
                    statusEl.innerText = "Sending file as 4 separate packages...";
                    const colors = ["#ef4444", "#3b82f6", "#10b981", "#eab308"];
                    
                    // Paths:
                    // P1: S -> R1 -> R3 -> Rec
                    // P2: S -> R2 -> R4 -> Rec
                    // P3: S -> R1 -> R4 -> Rec
                    // P4: S -> R2 -> R3 -> Rec
                    const paths = [
                        [{x: 100, y: 190}, {x: 300, y: 100}, {x: 500, y: 100}, {x: 700, y: 190}],
                        [{x: 100, y: 190}, {x: 300, y: 280}, {x: 500, y: 280}, {x: 700, y: 190}],
                        [{x: 100, y: 190}, {x: 300, y: 100}, {x: 500, y: 280}, {x: 700, y: 190}],
                        [{x: 100, y: 190}, {x: 300, y: 280}, {x: 500, y: 100}, {x: 700, y: 190}]
                    ];

                    paths.forEach((path, i) => {
                        timers.push(setTimeout(() => {
                            const dot = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                            dot.setAttribute("width", "12");
                            dot.setAttribute("height", "12");
                            dot.setAttribute("x", "-6");
                            dot.setAttribute("y", "-6");
                            dot.setAttribute("rx", "2");
                            dot.setAttribute("fill", colors[i]);
                            packetsGroup.appendChild(dot);
                            
                            animateDotAlongPath(dot, path, 1400);
                        }, i * 300));
                    });

                    timers.push(setTimeout(() => {
                        statusEl.innerText = "All packets arrived and built into final file! 🧩";
                        sendBtn.disabled = false;
                        toggleBtn.disabled = false;
                    }, 3000));
                }
            };

            function animateDotAlongPath(element, coords, duration) {
                let startTime = null;
                function step(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const progress = (timestamp - startTime) / duration;
                    if (progress < 1) {
                        // Interpolate coordinates
                        const segs = coords.length - 1;
                        const currSeg = Math.floor(progress * segs);
                        const segProgress = (progress * segs) - currSeg;
                        
                        const start = coords[currSeg];
                        const end = coords[currSeg + 1];
                        
                        const x = start.x + (end.x - start.x) * segProgress;
                        const y = start.y + (end.y - start.y) * segProgress;
                        
                        element.setAttribute("cx" in element ? "cx" : "x", "cx" in element ? x : x - 6);
                        element.setAttribute("cy" in element ? "cy" : "y", "cy" in element ? y : y - 6);
                        
                        requestAnimationFrame(step);
                    } else {
                        element.remove();
                    }
                }
                requestAnimationFrame(step);
            }

            activeAnimations['switching'] = {
                interval: null,
                clear: () => timers.forEach(clearTimeout)
            };
        }

        function setupTCPUDPPlayground(container, controls) {
            controls.innerHTML = `

                    <!-- Chat / Packet Lines Dynamic Group -->
                    <g id="tcp-lines"></g>
                </svg>
            `;

            const tcpLines = document.getElementById('tcp-lines');
            const tcpStatus = document.getElementById('tcp-status');
            const btnTCP = document.getElementById('btn-send-tcp');
            const btnUDP = document.getElementById('btn-send-udp');

            let timers = [];

            function clearScreen() {
                tcpLines.innerHTML = '';
                timers.forEach(clearTimeout);
                timers = [];
            }

            btnTCP.onclick = () => {
                clearScreen();
                btnTCP.disabled = true;
                btnUDP.disabled = true;
                tcpStatus.innerText = "Establishing TCP Three-Way Handshake...";

                // Handshake step 1 (SYN)
                drawSyncLine(200, 70, 600, 100, "SYN (Ready to talk?)", "var(--accent)");
                
                timers.push(setTimeout(() => {
                    // Handshake step 2 (SYN-ACK)
                    drawSyncLine(600, 100, 200, 130, "SYN-ACK (Yes, let's talk!)", "var(--accent-sec)");
                }, 800));

                timers.push(setTimeout(() => {
                    // Handshake step 3 (ACK)
                    drawSyncLine(200, 130, 600, 160, "ACK (Connection established!)", "var(--accent)");
                    tcpStatus.innerText = "Connection Established. Transmitting Segment 1...";
                }, 1600));

                timers.push(setTimeout(() => {
                    drawSyncLine(200, 180, 600, 210, "DATA 1 (Sending part 1)", "#3b82f6");
                }, 2400));

                timers.push(setTimeout(() => {
                    drawSyncLine(600, 210, 200, 240, "ACK 1 (Got part 1 safely!)", "#10b981");
                    tcpStatus.innerText = "Segment 1 Acknowledged. Sending Segment 2...";
                }, 3200));

                timers.push(setTimeout(() => {
                    drawSyncLine(200, 260, 600, 290, "DATA 2 (Sending part 2)", "#3b82f6");
                }, 4000));

                timers.push(setTimeout(() => {
                    drawSyncLine(600, 290, 200, 320, "ACK 2 (Got part 2 safely!)", "#10b981");
                    tcpStatus.innerText = "Transmission Complete! Closing Connection...";
                }, 4800));

                timers.push(setTimeout(() => {
                    tcpStatus.innerText = "TCP Session closed safely! Zero packet loss.";
                    btnTCP.disabled = false;
                    btnUDP.disabled = false;
                }, 5600));
            };

            btnUDP.onclick = () => {
                clearScreen();
                btnTCP.disabled = true;
                btnUDP.disabled = true;
                tcpStatus.innerText = "UDP Stream: Hurling packets instantly...";

                // Fire multiple data packets consecutively without handshakes or ACKs
                for(let i=0; i<6; i++) {
                    timers.push(setTimeout(() => {
                        const yStart = 80 + i*40;
                        const yEnd = 110 + i*40;
                        const isLost = i === 2 || i === 4; // Intentionally lose two packets
                        
                        drawUDPBalloonLine(200, yStart, 600, yEnd, `DATA ${i+1} ${isLost ? '(Lost!) ❌' : '(Arrived!) 🎈'}`, isLost);
                    }, i * 350));
                }

                timers.push(setTimeout(() => {
                    tcpStatus.innerText = "UDP Completed. 4 packets received, 2 packets lost. No retransmissions requested.";
                    btnTCP.disabled = false;
                    btnUDP.disabled = false;
                }, 2800));
            };

            function drawSyncLine(x1, y1, x2, y2, text, color) {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", x1);
                line.setAttribute("y1", y1);
                line.setAttribute("x2", x1);
                line.setAttribute("y2", y1);
                line.setAttribute("stroke", color);
                line.setAttribute("stroke-width", "3");
                line.setAttribute("marker-end", "url(#arrow)");
                tcpLines.appendChild(line);

                const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                txt.setAttribute("x", (x1+x2)/2);
                txt.setAttribute("y", (y1+y2)/2 - 5);
                txt.setAttribute("fill", "#fff");
                txt.setAttribute("font-size", "10");
                txt.setAttribute("text-anchor", "middle");
                txt.textContent = text;
                txt.setAttribute("opacity", "0");
                tcpLines.appendChild(txt);

                // Animate
                let start = null;
                const duration = 600;
                function draw(time) {
                    if (!start) start = time;
                    const p = (time - start) / duration;
                    if (p < 1) {
                        line.setAttribute("x2", x1 + (x2-x1)*p);
                        line.setAttribute("y2", y1 + (y2-y1)*p);
                        requestAnimationFrame(draw);
                    } else {
                        line.setAttribute("x2", x2);
                        line.setAttribute("y2", y2);
                        txt.setAttribute("opacity", "1");
                    }
                }
                requestAnimationFrame(draw);
            }

            function drawUDPBalloonLine(x1, y1, x2, y2, text, isLost) {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", x1);
                line.setAttribute("y1", y1);
                line.setAttribute("x2", x1);
                line.setAttribute("y2", y1);
                line.setAttribute("stroke", isLost ? "#ef4444" : "#10b981");
                line.setAttribute("stroke-width", "2");
                tcpLines.appendChild(line);

                const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                txt.setAttribute("x", isLost ? 350 : (x1+x2)/2);
                txt.setAttribute("y", (y1+y2)/2 - 5);
                txt.setAttribute("fill", isLost ? "#f87171" : "#a7f3d0");
                txt.setAttribute("font-size", "10");
                txt.setAttribute("text-anchor", "middle");
                txt.textContent = text;
                txt.setAttribute("opacity", "0");
                tcpLines.appendChild(txt);

                let start = null;
                const duration = 500;
                function draw(time) {
                    if (!start) start = time;
                    const p = (time - start) / duration;
                    if (p < 1) {
                        if (isLost && p > 0.5) {
                            // Stop midway
                            line.setAttribute("x2", x1 + (x2-x1)*0.5);
                            line.setAttribute("y2", y1 + (y2-y1)*0.5);
                            txt.setAttribute("opacity", "1");
                        } else {
                            line.setAttribute("x2", x1 + (x2-x1)*p);
                            line.setAttribute("y2", y1 + (y2-y1)*p);
                            requestAnimationFrame(draw);
                        }
                    } else {
                        if (!isLost) {
                            line.setAttribute("x2", x2);
                            line.setAttribute("y2", y2);
                            txt.setAttribute("opacity", "1");
                        }
                    }
                }
                requestAnimationFrame(draw);
            }

            activeAnimations['tcpudp'] = {
                interval: null,
                clear: () => clearScreen()
            };
        }

        // 4. Leaky Bucket water drip animation
        function setupLeakyBucketPlayground(container, controls) {
            controls.innerHTML = `
                <div class="parameter-slider">
                    <label>💧 Water Faucet Speed:</label>
                    <input type="range" id="faucet-rate" min="0" max="100" value="30">
                </div>
                <button class="control-btn" id="btn-clear-bucket" style="margin-left:12px;">Reset Bucket</button>
            `;

            container.innerHTML = `
                <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%;">
                    <svg width="400" height="360" viewBox="0 0 300 300" style="background:#050a12; border-radius:8px;" id="leaky-svg">
                        <!-- Faucet -->
                        <path d="M120 20 L180 20 L180 40 L160 40 L160 55" fill="none" stroke="#64748b" stroke-width="8"/>
                        <circle cx="160" cy="55" r="5" fill="#38bdf8"/>
                        
                        <!-- Water Bucket -->
                        <path d="M90 100 L110 240 L190 240 L210 100 Z" fill="none" stroke="#e2e8f0" stroke-width="4"/>
                        <!-- Water dynamic layer -->
                        <polygon points="110 240, 190 240, 190 240, 110 240" fill="rgba(56, 189, 248, 0.4)" id="bucket-water"/>
                        
                        <!-- Drip outlet -->
                        <line x1="150" y1="240" x2="150" y2="250" stroke="#e2e8f0" stroke-width="4"/>
                        <circle cx="150" cy="270" r="4" fill="#38bdf8" id="bucket-drip" style="opacity:0;"/>
                        
                        <!-- Status text inside SVG -->
                        <text x="150" y="170" fill="white" font-weight="bold" font-size="12" text-anchor="middle" id="bucket-warning"></text>
                    </svg>
                </div>
            `;

            const water = document.getElementById('bucket-water');
            const drip = document.getElementById('bucket-drip');
            const warning = document.getElementById('bucket-warning');
            const faucetSlider = document.getElementById('faucet-rate');
            const resetBtn = document.getElementById('btn-clear-bucket');

            let fillLevel = 0; // percentage
            const capacity = 240; // bottom y=240, top y=100
            
            // Interval to simulate dripping & pouring
            const interval = setInterval(() => {
                const flowRate = parseFloat(faucetSlider.value) / 10;
                
                // Add water based on flowRate
                if (flowRate > 0) {
                    fillLevel += flowRate;
                    // Spawn drop falling from faucet
                    spawnDrop();
                }

                // Leak water at constant rate (e.g. 1.2 units per step)
                if (fillLevel > 0) {
                    fillLevel = Math.max(0, fillLevel - 1.2);
                    dripWater();
                }

                // Check for overflow
                if (fillLevel > 100) {
                    fillLevel = 100;
                    warning.textContent = "💥 OVERFLOW! PACKETS LOST!";
                    warning.setAttribute("fill", "#ef4444");
                } else {
                    warning.textContent = fillLevel > 70 ? "⚠️ Buffer filling up..." : "";
                    warning.setAttribute("fill", "#f59e0b");
                }

                // Update SVG points
                updateWaterPolygon();

            }, 100);

            function updateWaterPolygon() {
                const heightOffset = fillLevel * 1.4; // 140px max height
                const yTop = 240 - heightOffset;
                
                // Calculate width at current depth
                const xLeft = 110 - (fillLevel * 0.2);
                const xRight = 190 + (fillLevel * 0.2);

                water.setAttribute("points", `110 240, 190 240, ${xRight} ${yTop}, ${xLeft} ${yTop}`);
            }

            function spawnDrop() {
                const drop = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                drop.setAttribute("cx", "160");
                drop.setAttribute("cy", "60");
                drop.setAttribute("r", "3");
                drop.setAttribute("fill", "#38bdf8");
                document.getElementById('leaky-svg').appendChild(drop);

                let start = null;
                const duration = 300;
                const heightLimit = 240 - (fillLevel * 1.4);
                function animate(time) {
                    if (!start) start = time;
                    const p = (time - start) / duration;
                    if (p < 1) {
                        const y = 60 + (heightLimit - 60) * p;
                        drop.setAttribute("cy", y);
                        requestAnimationFrame(animate);
                    } else {
                        drop.remove();
                    }
                }
                requestAnimationFrame(animate);
            }

            function dripWater() {
                drip.style.opacity = '1';
                let start = null;
                const duration = 400;
                function animate(time) {
                    if (!start) start = time;
                    const p = (time - start) / duration;
                    if (p < 1) {
                        drip.setAttribute("cy", 250 + 40*p);
                        drip.style.opacity = 1 - p;
                        requestAnimationFrame(animate);
                    } else {
                        drip.style.opacity = '0';
                    }
                }
                requestAnimationFrame(animate);
            }

            resetBtn.onclick = () => {
                fillLevel = 0;
                updateWaterPolygon();
                warning.textContent = "";
            };

            activeAnimations['leakybucket'] = {
                interval: interval,
                clear: () => clearInterval(interval)
            };
        }

        // 5. Token Ring pass network animation
        function setupTokenRingPlayground(container, controls) {
            controls.innerHTML = `
                <button class="control-btn" id="btn-enqueue-node">🪄 Enqueue Node Msg</button>
                <div style="font-size:0.8rem; color:var(--text-dim); margin-left:12px;" id="token-status">Wait for the token to transmit messages.</div>
            `;

            container.innerHTML = `
                <svg width="100%" height="380" viewBox="0 0 800 380" style="background:#050a12; border-radius:8px;" id="token-svg">
                    <!-- Circle layout Ring path -->
                    <circle cx="400" cy="190" r="110" fill="none" stroke="#1e293b" stroke-width="4"/>

                    <!-- Nodes -->
                    <!-- Node A (0 deg) -->
                    <g transform="translate(400, 80)" class="token-node" id="n-a">
                        <circle cx="0" cy="0" r="20" fill="#1e293b" stroke="#475569" stroke-width="2" id="node-a-circle"/>
                        <text cx="0" cy="4" fill="white" font-weight="bold" text-anchor="middle" font-size="10">A</text>
                    </g>
                    <!-- Node B (72 deg) -->
                    <g transform="translate(505, 156)" class="token-node" id="n-b">
                        <circle cx="0" cy="0" r="20" fill="#1e293b" stroke="#475569" stroke-width="2" id="node-b-circle"/>
                        <text cx="0" cy="4" fill="white" font-weight="bold" text-anchor="middle" font-size="10">B</text>
                    </g>
                    <!-- Node C (144 deg) -->
                    <g transform="translate(465, 279)" class="token-node" id="n-c">
                        <circle cx="0" cy="0" r="20" fill="#1e293b" stroke="#475569" stroke-width="2" id="node-c-circle"/>
                        <text cx="0" cy="4" fill="white" font-weight="bold" text-anchor="middle" font-size="10">C</text>
                    </g>
                    <!-- Node D (216 deg) -->
                    <g transform="translate(335, 279)" class="token-node" id="n-d">
                        <circle cx="0" cy="0" r="20" fill="#1e293b" stroke="#475569" stroke-width="2" id="node-d-circle"/>
                        <text cx="0" cy="4" fill="white" font-weight="bold" text-anchor="middle" font-size="10">D</text>
                    </g>
                    <!-- Node E (288 deg) -->
                    <g transform="translate(295, 156)" class="token-node" id="n-e">
                        <circle cx="0" cy="0" r="20" fill="#1e293b" stroke="#475569" stroke-width="2" id="node-e-circle"/>
                        <text cx="0" cy="4" fill="white" font-weight="bold" text-anchor="middle" font-size="10">E</text>
                    </g>

                    <!-- Token visual ring -->
                    <circle cx="400" cy="80" r="8" fill="var(--accent-sec)" id="token-indicator" filter="drop-shadow(0 0 8px var(--accent-sec))"/>
                </svg>
            `;

            const tokenIndicator = document.getElementById('token-indicator');
            const statusEl = document.getElementById('token-status');
            const enqueueBtn = document.getElementById('btn-enqueue-node');

            const angles = [0, 72, 144, 216, 288]; // A, B, C, D, E coords
            const nodeIds = ['a', 'b', 'c', 'd', 'e'];
            let currentTokenPosition = 0; // index of node holding token
            let messageQueue = []; // indices of nodes waiting to send data

            enqueueBtn.onclick = () => {
                // Randomly assign a node message
                const randomNodeIndex = Math.floor(Math.random() * 5);
                const nodeId = nodeIds[randomNodeIndex];
                if (!messageQueue.includes(randomNodeIndex)) {
                    messageQueue.push(randomNodeIndex);
                    document.getElementById(`node-${nodeId}-circle`).setAttribute("stroke", "var(--accent)");
                    statusEl.innerText = `Node ${nodeId.toUpperCase()} queued a message! Waiting for token...`;
                }
            };

            // Loop to pass the token clockwise around the circle
            const interval = setInterval(() => {
                if (messageQueue.includes(currentTokenPosition)) {
                    // This node has a message to send!
                    const nodeId = nodeIds[currentTokenPosition];
                    statusEl.innerText = `Token captured by Node ${nodeId.toUpperCase()}. Sending packet!`;
                    document.getElementById(`node-${nodeId}-circle`).setAttribute("fill", "rgba(16, 185, 129, 0.4)");
                    
                    // Remove from queue
                    messageQueue = messageQueue.filter(item => item !== currentTokenPosition);
                    
                    // Stop token rotation for a moment to transmit
                    clearInterval(activeAnimations['tokenring'].interval);

                    setTimeout(() => {
                        // Reset node fill
                        document.getElementById(`node-${nodeId}-circle`).setAttribute("fill", "#1e293b");
                        document.getElementById(`node-${nodeId}-circle`).setAttribute("stroke", "#475569");
                        statusEl.innerText = `Message sent successfully. Releasing token.`;
                        
                        // Resume rotation
                        currentTokenPosition = (currentTokenPosition + 1) % 5;
                        moveTokenIndicator();
                        setupTokenRingPlaygroundLoop();
                    }, 1200);

                } else {
                    // Just pass the token to the next node
                    currentTokenPosition = (currentTokenPosition + 1) % 5;
                    moveTokenIndicator();
                }
            }, 800);

            function setupTokenRingPlaygroundLoop() {
                // Re-register interval
                activeAnimations['tokenring'].interval = setInterval(() => {
                    if (messageQueue.includes(currentTokenPosition)) {
                        const nodeId = nodeIds[currentTokenPosition];
                        statusEl.innerText = `Token captured by Node ${nodeId.toUpperCase()}. Sending packet!`;
                        document.getElementById(`node-${nodeId}-circle`).setAttribute("fill", "rgba(16, 185, 129, 0.4)");
                        messageQueue = messageQueue.filter(item => item !== currentTokenPosition);
                        clearInterval(activeAnimations['tokenring'].interval);
                        setTimeout(() => {
                            document.getElementById(`node-${nodeId}-circle`).setAttribute("fill", "#1e293b");
                            document.getElementById(`node-${nodeId}-circle`).setAttribute("stroke", "#475569");
                            statusEl.innerText = `Message sent successfully. Releasing token.`;
                            currentTokenPosition = (currentTokenPosition + 1) % 5;
                            moveTokenIndicator();
                            setupTokenRingPlaygroundLoop();
                        }, 1200);
                    } else {
                        currentTokenPosition = (currentTokenPosition + 1) % 5;
                        moveTokenIndicator();
                    }
                }, 800);
            }

            function moveTokenIndicator() {
                const angle = angles[currentTokenPosition] - 90; // offset so 0 deg is top A
                const rad = angle * Math.PI / 180;
                const x = 400 + 110 * Math.cos(rad);
                const y = 190 + 110 * Math.sin(rad);
                
                tokenIndicator.setAttribute("cx", x);
                tokenIndicator.setAttribute("cy", y);
            }

            activeAnimations['tokenring'] = {
                interval: interval,
                clear: () => clearInterval(interval)
            };
        }

        // 6. Fiber Optics laser transmission reflection animation
        function setupFiberPlayground(container, controls) {
            controls.innerHTML = `
                <button class="control-btn" id="btn-laser">🔦 Shine Laser (Single-Mode)</button>
                <button class="control-btn" id="btn-led" style="margin-left:12px;">💡 Shine LED (Multi-Mode)</button>
                <div style="font-size:0.8rem; color:var(--text-dim); margin-left:12px;" id="fiber-status">Select light source to transmit data.</div>
            `;

            container.innerHTML = `
                <svg width="100%" height="380" viewBox="0 0 800 380" style="background:#050a12; border-radius:8px;" id="fiber-svg">
                    <!-- Glass Fiber Core and Cladding borders -->
                    <path d="M 50 190 Q 220 100 400 190 T 750 190" fill="none" stroke="#1e293b" stroke-width="40" stroke-linecap="round" id="cladding"/>
                    <path d="M 50 190 Q 220 100 400 190 T 750 190" fill="none" stroke="#334155" stroke-width="12" stroke-linecap="round" id="core"/>
                    
                    <text x="80" y="145" fill="var(--text-dim)" font-size="10">Glass Core</text>
                    <text x="240" y="80" fill="var(--text-dim)" font-size="10">Cladding Boundary</text>
                    
                    <!-- Light Rays Dynamic Group -->
                    <g id="light-rays"></g>
                    
                    <!-- Sender laser source -->
                    <rect x="20" y="170" width="30" height="40" fill="#64748b" rx="2"/>
                    <circle cx="50" cy="190" r="5" fill="#475569"/>
                    
                    <!-- Receiver sensor -->
                    <rect x="750" y="170" width="30" height="40" fill="#64748b" rx="2"/>
                    <circle cx="750" cy="190" r="8" fill="#475569" id="sensor-glow"/>
                </svg>
            `;

            const raysGroup = document.getElementById('light-rays');
            const sensor = document.getElementById('sensor-glow');
            const statusEl = document.getElementById('fiber-status');

            let timers = [];

            document.getElementById('btn-laser').onclick = () => {
                raysGroup.innerHTML = '';
                timers.forEach(clearTimeout);
                timers = [];
                sensor.setAttribute("fill", "#475569");
                statusEl.innerText = "Laser activated. Light ray follows a single, straight-focused path.";

                // Generate Single-Mode clean laser path (perfect reflection or straight center)
                const laserLine = document.createElementNS("http://www.w3.org/2000/svg", "path");
                laserLine.setAttribute("d", "M 50 190 Q 220 100 400 190 T 750 190");
                laserLine.setAttribute("fill", "none");
                laserLine.setAttribute("stroke", "#ef4444");
                laserLine.setAttribute("stroke-width", "4");
                laserLine.setAttribute("stroke-dasharray", "700");
                laserLine.setAttribute("stroke-dashoffset", "700");
                
                // Add glowing filter
                laserLine.setAttribute("filter", "drop-shadow(0 0 6px #ef4444)");
                raysGroup.appendChild(laserLine);

                // Animate stroke drawing
                let start = null;
                const duration = 1200;
                function draw(time) {
                    if (!start) start = time;
                    const p = (time - start) / duration;
                    if (p < 1) {
                        laserLine.setAttribute("stroke-dashoffset", 700 - 700*p);
                        requestAnimationFrame(draw);
                    } else {
                        laserLine.setAttribute("stroke-dashoffset", "0");
                        sensor.setAttribute("fill", "#ef4444");
                        statusEl.innerText = "Single-mode signal received! Zero reflection interference (ideal for long ranges).";
                    }
                }
                requestAnimationFrame(draw);
            };

            document.getElementById('btn-led').onclick = () => {
                raysGroup.innerHTML = '';
                timers.forEach(clearTimeout);
                timers = [];
                sensor.setAttribute("fill", "#475569");
                statusEl.innerText = "LED activated. Multiple light rays bounce down the fiber cladding walls.";

                // Generate bouncing rays representing multi-mode light propagation
                const points1 = "M 50 190 L 100 178 L 170 200 L 240 175 L 310 198 L 380 180 L 450 200 L 520 180 L 590 202 L 660 180 L 750 190";
                const points2 = "M 50 190 L 130 202 L 210 178 L 290 200 L 370 180 L 450 202 L 530 178 L 610 200 L 690 180 L 750 190";

                const r1 = createRay(points1, "#f59e0b");
                const r2 = createRay(points2, "#eab308");

                raysGroup.appendChild(r1);
                raysGroup.appendChild(r2);

                animateRay(r1, 1400, () => {
                    sensor.setAttribute("fill", "#f59e0b");
                    statusEl.innerText = "Multi-mode signal received! Notice how multiple paths (modes) arrive slightly scattered.";
                });
                animateRay(r2, 1600, null);
            };

            function createRay(d, color) {
                const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                p.setAttribute("d", d);
                p.setAttribute("fill", "none");
                p.setAttribute("stroke", color);
                p.setAttribute("stroke-width", "2");
                p.setAttribute("stroke-dasharray", "800");
                p.setAttribute("stroke-dashoffset", "800");
                p.setAttribute("filter", `drop-shadow(0 0 4px ${color})`);
                return p;
            }

            function animateRay(ray, duration, callback) {
                let start = null;
                function draw(time) {
                    if (!start) start = time;
                    const p = (time - start) / duration;
                    if (p < 1) {
                        ray.setAttribute("stroke-dashoffset", 800 - 800*p);
                        requestAnimationFrame(draw);
                    } else {
                        ray.setAttribute("stroke-dashoffset", "0");
                        if (callback) callback();
                    }
                }
                requestAnimationFrame(draw);
            }

            activeAnimations['fiberoptics'] = {
                interval: null,
                clear: () => timers.forEach(clearTimeout)
            };
        }

        // Initialize SPA
        init();
    </script>
